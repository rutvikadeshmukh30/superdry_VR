<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superdry VR - Hand Gesture Locomotion</title>
    <!-- A-Frame 1.4.2 -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script>
        // --- CONSTANTS ---
        const PALETTE = {
            body: '#6B7280',
            joint: '#9CA3AF',
            neon: '#ff4500',
            espresso: '#3e2723'
        };

        // --- HAND TRACKING & GESTURE SYSTEM ---
        AFRAME.registerComponent('hand-gesture-locomotion', {
            init: function () {
                this.rig = document.querySelector('#rig');
                this.camera = document.querySelector('#head');
                this.forwardSpeed = 1.8;
                this.backwardSpeed = 1.5;
                this.activeGesture = 'none'; // 'forward', 'backward', 'none'
                
                this.handJoints = { left: {}, right: {} };
                this.setupAvatarHands('left');
                this.setupAvatarHands('right');
            },

            setupAvatarHands: function(side) {
                const handEl = document.querySelector(`#${side}-hand`);
                const joints = [
                    'wrist', 'thumb-tip', 'index-finger-tip', 'middle-finger-tip', 'ring-finger-tip', 'pinky-finger-tip'
                ];
                joints.forEach(j => {
                    let jointEl = document.createElement('a-sphere');
                    jointEl.setAttribute('radius', 0.012);
                    jointEl.setAttribute('material', `color: ${PALETTE.joint}`);
                    handEl.appendChild(jointEl);
                    this.handJoints[side][j] = jointEl;
                });
            },

            tick: function (t, dt) {
                const frame = this.el.sceneEl.frame;
                const session = this.el.sceneEl.xrSession;
                if (!frame || !session) return;

                let movementDirection = 0; // 1 for forward, -1 for backward

                session.inputSources.forEach(source => {
                    if (!source.hand) return;

                    const refSpace = this.el.sceneEl.renderer.xr.getReferenceSpace();
                    const wrist = source.hand.get('wrist');
                    const wristPose = frame.getJointPose(wrist, refSpace);

                    if (wristPose) {
                        // Update visual hand position
                        const side = source.handedness;
                        this.handJoints[side]['wrist'].object3D.position.copy(wristPose.transform.position);
                        
                        // GESTURE DETECTION
                        // Use the orientation of the wrist to determine palm direction
                        const orientation = wristPose.transform.orientation;
                        const wristQuat = new THREE.Quaternion(orientation.x, orientation.y, orientation.z, orientation.w);
                        const palmNormal = new THREE.Vector3(0, 0, 1).applyQuaternion(wristQuat); // Normal vector out of palm
                        
                        // Vector from headset to hand
                        const headPos = this.camera.object3D.getWorldPosition(new THREE.Vector3());
                        const handPos = new THREE.Vector3().copy(wristPose.transform.position);
                        const toHand = new THREE.Vector3().subVectors(handPos, headPos).normalize();

                        const dot = palmNormal.dot(toHand);

                        // Palm facing AWAY (Pushing Forward)
                        if (dot < -0.5) {
                            movementDirection = 1;
                            this.activeGesture = 'forward';
                        } 
                        // Palm facing TOWARD (Pulling Backward)
                        else if (dot > 0.5) {
                            if (movementDirection !== 1) movementDirection = -1; // Forward takes priority
                            this.activeGesture = 'backward';
                        } else {
                            this.activeGesture = 'none';
                        }
                    }
                });

                // Apply Movement
                if (movementDirection !== 0) {
                    const direction = new THREE.Vector3();
                    this.camera.object3D.getWorldDirection(direction);
                    direction.y = 0; // Lock to floor
                    direction.normalize();

                    const speed = movementDirection === 1 ? this.forwardSpeed : this.backwardSpeed;
                    const velocity = direction.multiplyScalar(movementDirection * speed * (dt / 1000));
                    this.rig.object3D.position.add(velocity);
                }

                this.updateUI();
            },

            updateUI: function() {
                const fwdIcon = document.querySelector('#fwd-icon');
                const bwdIcon = document.querySelector('#bwd-icon');
                if (!fwdIcon || !bwdIcon) return;

                fwdIcon.setAttribute('material', 'color', this.activeGesture === 'forward' ? PALETTE.neon : '#444');
                bwdIcon.setAttribute('material', 'color', this.activeGesture === 'backward' ? PALETTE.neon : '#444');
            }
        });

        // PROCEDURAL TEXTURE GENERATOR
        AFRAME.registerComponent('procedural-texture', {
            schema: { type: {type: 'string'} },
            init: function () {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                if (this.data.type === 'concrete') {
                    ctx.fillStyle = '#2b1d1d'; ctx.fillRect(0,0,256,256);
                    for(let i=0; i<3000; i++) { ctx.fillStyle='rgba(255,255,255,0.03)'; ctx.fillRect(Math.random()*256, Math.random()*256, 1, 1); }
                } else if (this.data.type === 'wood') {
                    ctx.fillStyle = '#3e2723'; ctx.fillRect(0,0,256,256);
                    ctx.fillStyle = 'rgba(255,255,255,0.05)';
                    for(let i=0; i<100; i++) { ctx.fillRect(0, Math.random()*256, 256, 2); }
                }
                const tex = new THREE.CanvasTexture(canvas);
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(4, 4);
                this.el.addEventListener('object3dset', () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (mesh && mesh.material) mesh.material.map = tex;
                });
            }
        });
    </script>
</head>
<body>
    <a-scene 
        hand-gesture-locomotion
        renderer="antialias: true; colorManagement: true;" 
        fog="type: exponential; color: #110a08; density: 0.01"
        background="color: #110a08"
        webxr="optionalFeatures: hand-tracking">

        <a-assets>
            <a-mixin id="joint" geometry="primitive: sphere; radius: 0.01" material="color: #9CA3AF"></a-mixin>
        </a-assets>

        <!-- PLAYER RIG (Spawn at entrance) -->
        <a-entity id="rig" position="0 0 6">
            <a-camera id="head" look-controls position="0 1.6 0"></a-camera>
            
            <!-- Hand Entities -->
            <a-entity id="left-hand">
                <!-- WRIST HUD -->
                <a-entity position="0 0.05 0.1" rotation="-90 0 0">
                    <a-plane width="0.12" height="0.06" color="#000" opacity="0.8">
                        <a-triangle id="fwd-icon" position="-0.03 0 0.01" scale="0.02 0.02 0.02" color="#444" rotation="0 0 0"></a-triangle>
                        <a-triangle id="bwd-icon" position="0.03 0 0.01" scale="0.02 0.02 0.02" color="#444" rotation="0 0 180"></a-triangle>
                        <a-text value="PUSH / PULL" align="center" width="0.2" position="0 -0.02 0.01"></a-text>
                    </a-plane>
                </a-entity>
            </a-entity>
            <a-entity id="right-hand"></a-entity>

            <!-- AVATAR BODY -->
            <a-sphere radius="0.15" scale="1 1.2 1" material="color: #6B7280" position="0 1.6 0"></a-sphere>
            <a-cylinder radius="0.18" height="0.7" material="color: #6B7280" position="0 1.1 0"></a-cylinder>
        </a-entity>

        <!-- ENVIRONMENT -->
        <a-plane position="0 0 -10" rotation="-90 0 0" width="30" height="40" procedural-texture="type: concrete"></a-plane>
        
        <!-- EXTERIOR FACADE -->
        <a-entity position="0 5 0">
            <a-box position="-6 0 0" width="8" height="10" depth="0.5" material="color: #3e2723"></a-box>
            <a-box position="6 0 0" width="8" height="10" depth="0.5" material="color: #3e2723"></a-box>
            <!-- Entrance Logo -->
            <a-text value="SUPERDRY" align="center" width="18" position="0 2.5 0.3" color="#ff4500"></a-text>
        </a-entity>

        <!-- MIRROR (Right Wall) -->
        <a-entity position="9.5 2 -10" rotation="0 -90 0">
            <a-box width="5" height="4" depth="0.1" material="color: #222; metalness: 1; roughness: 0"></a-box>
            <a-text value="REFLECTIVE MIRROR" align="center" width="4" color="#444" position="0 0 0.06"></a-text>
        </a-entity>

        <!-- FIXTURES -->
        <a-entity position="0 0 -5">
            <a-box position="0 0.4 0" width="3" height="0.8" depth="1.5" procedural-texture="type: wood"></a-box>
            <a-box position="0 0.85 0" width="0.5" height="0.1" depth="0.3" material="color: #ff4500"></a-box>
        </a-entity>

        <!-- LIGHTING -->
        <a-entity light="type: ambient; color: #ffe0b2; intensity: 0.5"></a-entity>
        <a-entity light="type: point; color: #ff4500; intensity: 2; distance: 10" position="0 4 -5"></a-entity>

    </a-scene>
</body>
</html>
